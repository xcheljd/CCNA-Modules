    <title>CCNA Modules</title>
    <style>
      /* Loading screen uses CSS vars set by the theme script above */
      #initial-loader {
        position: fixed;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: hsl(var(--loading, 212 93% 45%));
        color: hsl(var(--loading-foreground, 0 0% 100%));
        display: flex;
        justify-content: center;
        align-items: center;
        z-index: 9999;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
      }
      #initial-loader .content { text-align: center; }
      #initial-loader .icon-wrap {
        width: 100px; height: 100px;
        margin: 0 auto 30px;
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        background: rgba(255,255,255,0.1);
        border-radius: 50%;
        backdrop-filter: blur(10px);
      }
      #initial-loader .network-lines {
        width: 60px; height: 60px;
        position: relative;
      }
      #initial-loader .network-lines span {
        position: absolute;
        background: white;
        border-radius: 2px;
        width: 100%;
        height: 4px;
        left: 0;
      }
      #initial-loader .network-lines span:nth-child(1) { top: 10px; animation: pulse1 1.5s ease-in-out infinite; }
      #initial-loader .network-lines span:nth-child(2) { top: 28px; animation: pulse2 1.5s ease-in-out infinite; }
      #initial-loader .network-lines span:nth-child(3) { top: 46px; animation: pulse3 1.5s ease-in-out infinite; }
      @keyframes spin {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      @keyframes pulse1 {
        0%, 100% { opacity: 0.3; transform: scaleX(0.8); }
        50% { opacity: 1; transform: scaleX(1); }
      }
      @keyframes pulse2 {
        0%, 100% { opacity: 0.3; transform: scaleX(0.8); }
        50% { opacity: 1; transform: scaleX(1); }
      }
      @keyframes pulse3 {
        0%, 100% { opacity: 0.3; transform: scaleX(0.8); }
        50% { opacity: 1; transform: scaleX(1); }
      }
      @keyframes loadingPulse {
        0%, 100% { transform: scaleX(0.3); opacity: 0.4; }
        50% { transform: scaleX(1); opacity: 1; }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="initial-loader">
        <div class="content">
          <div class="icon-wrap">
            <div class="network-lines">
              <span></span>
              <span></span>
              <span></span>
            </div>
          </div>
          <h1 style="font-size: 32px; margin-bottom: 40px; font-weight: 600; text-shadow: 0 2px 10px rgba(0,0,0,0.2)">CCNA 200-301 Course</h1>
          <div style="width: 200px; margin: 0 auto">
            <div style="width: 100%; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px; overflow: hidden">
              <div style="width: 100%; height: 100%; background: white; border-radius: 2px; animation: loadingPulse 2s ease-in-out infinite"></div>
            </div>
          </div>
        </div>
      </div>
