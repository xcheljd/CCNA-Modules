name: Build and Release

on:
  push:
    branches: [main]
    tags:
      - 'v*'
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Check formatting
        run: npm run format:check

      - name: Run tests
        run: npm run test:coverage

      - name: Build application
        run: npm run build

      - name: Create empty resources folder
        shell: bash
        run: mkdir -p resources && echo "Resources folder created for build"

      - name: Build macOS
        if: matrix.os == 'macos-latest'
        run: |
          npx electron-builder --mac --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Linux
        if: matrix.os == 'ubuntu-latest'
        run: |
          npx electron-builder --linux --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Windows
        if: matrix.os == 'windows-latest'
        run: |
          npx electron-builder --win --publish=never
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List release directory
        shell: bash
        run: |
          echo "Checking for release artifacts..."
          ls -la release/ || echo "No release directory found"

      - name: Upload macOS artifacts
        if: matrix.os == 'macos-latest'
        uses: actions/upload-artifact@v7
        with:
          name: macOS-builds
          path: |
            release/*.dmg
            release/*.zip
            release/*.yml

      - name: Upload Linux artifacts
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v7
        with:
          name: Linux-builds
          path: |
            release/*.AppImage
            release/*.deb
            release/*.yml

      - name: Upload Windows artifacts
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v7
        with:
          name: Windows-builds
          path: |
            release/*.exe
            release/*.yml

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Check out Git repository
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Display structure of downloaded files
        run: ls -R artifacts

      - name: Prepare release files
        shell: bash
        run: |
          mkdir -p release-files
          # Copy only installer files (exclude metadata and blockmaps)
          find artifacts -type f \( -name "*.dmg" -o -name "*.zip" -o -name "*.exe" -o -name "*.AppImage" -o -name "*.deb" \) \
            ! -name "*.blockmap" \
            -exec cp {} release-files/ \;
          echo "Release files prepared:"
          ls -lh release-files/

      - name: Extract changelog entry for tag
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          awk -v ver="$version" '
            /^## \[/ {
              if (found) exit
              if ($0 ~ "^## \\[" ver "\\]") { found=1; next }
            }
            found { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "::error::No changelog entry found for version $version in CHANGELOG.md"
            exit 1
          fi
          echo "Release notes preview:"
          cat release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-files/*
          draft: true
          prerelease: false
          body_path: release-notes.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
